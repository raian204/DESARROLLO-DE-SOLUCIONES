<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Restaurante</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

    <div class="login-box">
        <h2>App Restaurante</h2>
        <p>Inicio de sesión</p>

        <label>Usuario</label>
        <input type="text" id="usuario" placeholder="Ingrese usuario">

        <label>Contraseña</label>
        <input type="password" id="password" placeholder="Ingrese contraseña">

        <button class="btn-ingresar" onclick="login()">Ingresar</button>
        <button class="btn-registrar">Registrar</button>
        <button class="btn-nombre">Jahn Reyes</button>
        <button class="btn-ayuda">Ayuda</button>
    </div>

    <!-- Cambio realizado en la rama feature/login -->

    <script>
        function login() {
            let usuario = document.getElementById("usuario").value;
            let password = document.getElementById("password").value;

            if (usuario === "admin" && password === "123") {
                window.location.href = "usuarios.html";
            } else {
                alert("Usuario o contraseña incorrectos");
            }
        }
    </script>
<!-- Cambio realizado en la rama feature/login2 -->
 <!-- Sección correspondiente al módulo de usuario -->
</body>
</html>
